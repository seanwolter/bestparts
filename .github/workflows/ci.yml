name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  checks:
    name: Lint, typecheck, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

  database-tests:
    name: Integration and Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: checks

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bestparts
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bestparts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bestparts?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@127.0.0.1:5432/bestparts?schema=test
      SESSION_SECRET: ci-session-secret-value-with-enough-length
      WEBAUTHN_RP_NAME: bestparts
      WEBAUTHN_RP_ID: 127.0.0.1
      WEBAUTHN_ORIGIN: http://127.0.0.1:3001
      TMDB_TOKEN: ci-placeholder-token
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify PostgreSQL-backed integration tests
        run: npm run test:integration

      - name: Verify browser end-to-end tests
        run: npm run test:e2e
